{{- if .Values.basicAuth.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "traefik-dashboard.fullname" . }}-basicauth
  namespace: {{ .Values.namespace }}
spec:
  basicAuth:
    secret: {{ .Values.basicAuth.secretName }}
    removeHeader: true
---
{{- end }}
{{- if .Values.ipAllowList.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "traefik-dashboard.fullname" . }}-ipallow
  namespace: {{ .Values.namespace }}
spec:
  ipAllowList:
    sourceRange:
{{ toYaml .Values.ipAllowList.sourceRange | indent 6 }}
    ipStrategy:
{{ toYaml .Values.ipAllowList.ipStrategy | indent 6 }}
---
{{- end }}
{{- if .Values.dashboardRootRedirect }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "traefik-dashboard.fullname" . }}-root-redirect
  namespace: {{ .Values.namespace }}
spec:
  redirectRegex:
    regex: "^/$"
    replacement: "/dashboard/"
    permanent: true
---
{{- end }}
{{- if .Values.dashboardAppendSlashRedirect }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "traefik-dashboard.fullname" . }}-dash-append-slash
  namespace: {{ .Values.namespace }}
spec:
  redirectRegex:
    regex: "^/dashboard$"
    replacement: "/dashboard/"
    permanent: true
{{- end }}
