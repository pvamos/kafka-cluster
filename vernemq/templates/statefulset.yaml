# vernemq/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: vernemq
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  annotations:
    {{- if .Values.authFile.enabled }}
    {{- if .Values.authFile.reloadNonce }}
    vernemq.envsensor.net/auth-reload-nonce: {{ .Values.authFile.reloadNonce | quote }}
    {{- end }}
    {{- end }}
    {{- with .Values.podAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  # IMPORTANT: headless service name (targets internal listener)
  serviceName: {{ default .Release.Name .Values.service.headless.name }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vernemq
      app.kubernetes.io/instance: {{ .Release.Name }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vernemq
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/values: {{ toJson .Values | sha256sum }}
    spec:
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range .Values.image.pullSecrets }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      serviceAccountName: {{ if .Values.serviceAccount.create }}{{ default .Release.Name .Values.serviceAccount.name }}{{ else }}{{ default "default" .Values.serviceAccount.name }}{{ end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: vernemq
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            # External (NodePort service -> pod 31883). PROXY v2 enabled via env.
            - name: mqtt-ext
              containerPort: {{ .Values.listeners.externalProxy.port }}   # 31883
              protocol: TCP
            # Internal in-cluster listener (ClusterIP & headless use this). No PROXY.
            {{- if .Values.listeners.internalPlain.enabled }}
            - name: mqtt-int
              containerPort: {{ .Values.listeners.internalPlain.port }}  # 1883
              protocol: TCP
            {{- end }}
          env:
            # --- VerneMQ core ---
            - name: DOCKER_VERNEMQ_ACCEPT_EULA
              value: "yes"
            - name: DOCKER_VERNEMQ_ALLOW_ANONYMOUS
              value: "off"
            - name: DOCKER_VERNEMQ_LISTENER__TCP__LOCALHOST
              value: "127.0.0.1:0"

            # --- VerneMQ log level ---
            - name: DOCKER_VERNEMQ_LOG__CONSOLE  # options: off | file | console | both
              value: {{ .Values.logging.console | quote }}
            - name: DOCKER_VERNEMQ_LOG__CONSOLE__LEVEL  # debug | info | warning | error
              value: {{ .Values.logging.level | quote }}

            # External listener (fronted by HAProxy via NodePort; PROXY v2)
            - name: DOCKER_VERNEMQ_LISTENER__TCP__DEFAULT
              value: "0.0.0.0:{{ .Values.listeners.externalProxy.port }}"     # 31883
            - name: DOCKER_VERNEMQ_LISTENER__TCP__PROXY_PROTOCOL
              value: {{ ternary "on" "off" .Values.listeners.externalProxy.proxyProtocol | quote }}

            # Internal in-cluster listener (no PROXY)
            {{- if .Values.listeners.internalPlain.enabled }}
            - name: DOCKER_VERNEMQ_LISTENER__TCP__INTERNAL
              value: "0.0.0.0:{{ .Values.listeners.internalPlain.port }}"    # 1883
            - name: DOCKER_VERNEMQ_LISTENER__TCP__INTERNAL__PROXY_PROTOCOL
              value: "off"
            {{- end }}

            # Kubernetes clustering discovery
            {{- if .Values.cluster.kubernetes.enabled }}
            - name: DOCKER_VERNEMQ_DISCOVERY_KUBERNETES
              value: "1"
            - name: DOCKER_VERNEMQ_KUBERNETES_LABEL_SELECTOR
              value: {{ .Values.cluster.kubernetes.labelSelector | quote }}
            {{- if .Values.cluster.kubernetes.namespaceOverride }}
            - name: DOCKER_VERNEMQ_KUBERNETES_NAMESPACE
              value: {{ .Values.cluster.kubernetes.namespaceOverride | quote }}
            {{- else }}
            - name: DOCKER_VERNEMQ_KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- end }}
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- end }}

            # File auth (RWX vmq.passwd)
            {{- if .Values.authFile.enabled }}
            - name: DOCKER_VERNEMQ_PLUGINS__VMQ_PASSWD
              value: "on"
            - name: DOCKER_VERNEMQ_VMQ_PASSWD__PASSWORD_FILE
              value: "{{ .Values.authFile.mountPath }}/{{ .Values.authFile.passwordFile }}"
            - name: DOCKER_VERNEMQ_PLUGINS__VMQ_ACL
              value: "on"
            - name: DOCKER_VERNEMQ_VMQ_ACL__ACL_FILE
              value: "{{ .Values.authFile.mountPath }}/{{ .Values.authFile.aclFile }}"
            - name: DOCKER_VERNEMQ_VMQ_ACL__ACL_RELOAD_INTERVAL
              value: "10"
            {{- end }}

            # Enrich plugin (protobuf-only):
            # INPUT  payload: envsensor.Reading
            # OUTPUT payload: envsensor.vernemq.EnrichedReading (flattened/enriched)
            {{- if .Values.enrich.enabled }}
            - name: DOCKER_VERNEMQ_PLUGINS__VMQ_ENRICH
              value: "on"

            # Topic filters / mapping
            - name: VMQ_ENRICH_ACCEPT
              value: {{ .Values.enrich.accept | quote }}
            - name: VMQ_ENRICH_TOPIC_MAP
              value: {{ toJson .Values.enrich.topicMap | quote }}
            {{- if .Values.enrich.defaultTarget }}
            - name: VMQ_ENRICH_DEFAULT_TARGET
              value: {{ .Values.enrich.defaultTarget | quote }}
            {{- end }}

            # Publish options
            - name: VMQ_ENRICH_QOS
              value: {{ .Values.enrich.qos | quote }}
            - name: VMQ_ENRICH_RETAIN
              value: {{ ternary "true" "false" (default false .Values.enrich.retain) | quote }}

            # Maximum size (bytes) of the outgoing enriched protobuf message.
            - name: VMQ_ENRICH_MAX_OUTPUT_SIZE
              value: {{ default "1048576" .Values.enrich.maxOutputSize | quote }}

            # Optional metadata fields (protobuf core always includes: time, mac, and present sensor fields;
            # plus ipv4/ipv6 if available)
            - name: VMQ_ENRICH_INCLUDE_TOPIC
              value: {{ ternary "true" "false" (default true .Values.enrich.includeTopic) | quote }}
            - name: VMQ_ENRICH_INCLUDE_USER
              value: {{ ternary "true" "false" (default true .Values.enrich.includeUser) | quote }}
            - name: VMQ_ENRICH_INCLUDE_CLIENTID
              value: {{ ternary "true" "false" (default true .Values.enrich.includeClientId) | quote }}
            - name: VMQ_ENRICH_INCLUDE_BROKER
              value: {{ ternary "true" "false" (default true .Values.enrich.includeBroker) | quote }}

            # Logging
            - name: VMQ_ENRICH_LOG_LEVEL
              value: {{ .Values.enrich.logLevel | quote }}
            {{- if .Values.enrich.logPayloadSample }}
            # optional; shows first 64 bytes (raw inbound payload)
            - name: VMQ_ENRICH_LOG_PAYLOAD_SAMPLE
              value: {{ .Values.enrich.logPayloadSample | quote }}
            {{- end }}
            {{- end }}

            # Extra env passthrough
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          # Probes use the INTERNAL listener (1883)
          livenessProbe:
            tcpSocket:
              port: {{ .Values.listeners.internalPlain.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.listeners.internalPlain.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: data
              mountPath: /vernemq/data
            {{- if and .Values.authFile.enabled .Values.authFile.pvc.enabled }}
            - name: auth-shared
              mountPath: {{ .Values.authFile.mountPath }}
            {{- end }}

      volumes:
        {{- if and .Values.authFile.enabled .Values.authFile.pvc.enabled }}
        - name: auth-shared
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-auth" .Release.Name) .Values.authFile.pvc.existingClaim | quote }}
        {{- end }}

  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: vernemq
          app.kubernetes.io/instance: {{ .Release.Name }}
      spec:
        accessModes: {{ toJson .Values.persistence.accessModes }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
    {{- end }}
