# vernemq/templates/pdb.yaml
{{- /*
PodDisruptionBudget to protect VerneMQ pods during voluntary disruptions.
Rendered only when:
  - .Values.pdb.enabled is true (default true when not set), AND
  - .Values.replicaCount > 1  (otherwise a PDB would block all voluntary evictions)
You can choose either:
  - .Values.pdb.maxUnavailable  (e.g. 1), OR
  - .Values.pdb.minAvailable    (e.g. "80%" or 2)
If neither is set, we default to maxUnavailable: 1.
*/ -}}
{{- $pdb := .Values.pdb | default dict -}}
{{- $enabled := (hasKey $pdb "enabled") | ternary ($pdb.enabled) true -}}
{{- if and $enabled (gt (int (.Values.replicaCount | default 1)) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: vernemq
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vernemq
      app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if hasKey $pdb "minAvailable" }}
  minAvailable: {{ $pdb.minAvailable }}
  {{- else if hasKey $pdb "maxUnavailable" }}
  maxUnavailable: {{ $pdb.maxUnavailable }}
  {{- else }}
  maxUnavailable: 1
  {{- end }}
{{- end }}
