# vernemq/templates/auth-bootstrap-job.yaml
{{- /* Creates/updates vmq.passwd on the shared RWX volume from values.yaml users. */ -}}
{{- if and .Values.authFile.enabled .Values.authFile.pvc.enabled .Values.authFile.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-auth-bootstrap-%s" .Release.Name (now | date "20060102-150405") }}
  labels:
    app.kubernetes.io/name: vernemq
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-4"
    # Keep finished job/pod so we can read logs; old one is removed only
    # right before the next hook run.
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ default 3 .Values.authFile.bootstrap.backoffLimit }}
  ttlSecondsAfterFinished: 604800  # 7 days
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vernemq
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      # Make the PVC writable by the same UID/GID you use for the StatefulSet
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bootstrap
          image: "{{ .Values.authFile.bootstrap.image | default (printf "%s:%s" .Values.image.repository .Values.image.tag) }}"
          imagePullPolicy: {{ .Values.authFile.bootstrap.pullPolicy | default (.Values.image.pullPolicy | default "IfNotPresent") }}
          command: ["/bin/sh","-ceu"]
          args:
            - |
              set -euo pipefail

              # Locate vmq-passwd in the image (fail loudly if not found)
              VMQ_PASSWD="$(command -v vmq-passwd || true)"
              if [ -z "$VMQ_PASSWD" ]; then
                echo "ERROR: vmq-passwd not found in PATH of image: $(uname -a)" >&2
                echo "PATH=$PATH" >&2
                exit 127
              fi

              AUTH_DIR={{ .Values.authFile.mountPath | quote }}
              PASSFILE="$${AUTH_DIR}/{{ .Values.authFile.passwordFile }}"
              TMP="$${PASSFILE}.tmp"
              ACLFILE="$${AUTH_DIR}/{{ .Values.authFile.aclFile }}"

              mkdir -p "$${AUTH_DIR}"
              umask 077
              rm -f "$${TMP}"

              created=0

              # Prefer authFile.users; if empty, fall back to authFile.bootstrap.users
              {{- $users := .Values.authFile.users | default (list) -}}
              {{- if or (not $users) (eq (len $users) 0) -}}
              {{-   $users = (.Values.authFile.bootstrap.users | default (list)) -}}
              {{- end -}}

              {{- range $i, $u := $users }}
              {{- if hasKey $u "passwordHash" }}
              echo "{{ $u.username | quote | trimAll "\"" }}:{{ $u.passwordHash | quote | trimAll "\"" }}" >> "$${TMP}"
              created=1
              {{- else if hasKey $u "password" }}
              if [ "$${created}" -eq 0 ] && [ ! -e "$${TMP}" ]; then
                # first user: create the password file (ensure it doesn't exist yet)
                printf "%s\n%s\n" "{{ $u.password | quote | trimAll "\"" }}" "{{ $u.password | quote | trimAll "\"" }}" \
                  | "$${VMQ_PASSWD}" -c "$${TMP}" "{{ $u.username | quote | trimAll "\"" }}"
              else
                printf "%s\n%s\n" "{{ $u.password | quote | trimAll "\"" }}" "{{ $u.password | quote | trimAll "\"" }}" \
                  | "$${VMQ_PASSWD}" "$${TMP}" "{{ $u.username | quote | trimAll "\"" }}"
              fi
              created=1
              {{- else if hasKey $u "passwordFromSecret" }}
              echo "Skipping {{ $u.username }}: passwordFromSecret not yet implemented in Job." >&2 || true
              {{- else }}
              echo "Skipping user {{ $u.username }}: no password or passwordHash provided" >&2 || true
              {{- end }}
              {{- end }}

              # Ensure file exists even if no users were supplied
              [ -f "$${TMP}" ] || : > "$${TMP}"

              # Atomically replace and set sane permissions
              mv -f "$${TMP}" "$${PASSFILE}"
              chmod 0640 "$${PASSFILE}"
              echo "PASSFILE:"
              ls -la "$${PASSFILE}"
              cat "$${PASSFILE}"

              # ACL: update defaults to match protobuf-only pipeline topics.
              umask 027

              cat > "$${ACLFILE}" <<'EOF'
              {{- if .Values.authFile.aclContent }}
              {{ .Values.authFile.aclContent | trim | nindent 14 }}
              {{- else }}
              user test
              topic read envsensor/#
              topic write envsensor/#
              topic read enriched/envsensor/#
              topic write enriched/envsensor/#
              {{- end }}
              EOF

              chmod 0640 "$${ACLFILE}"
              echo "ACLFILE:"
              ls -la "$${ACLFILE}"
              cat "$${ACLFILE}"

          volumeMounts:
            - name: auth-shared
              mountPath: {{ .Values.authFile.mountPath | quote }}

      volumes:
        - name: auth-shared
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-auth" .Release.Name) .Values.authFile.pvc.existingClaim | quote }}
{{- end }}
