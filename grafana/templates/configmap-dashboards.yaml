{{- if .Values.dashboards.import.enabled }}
{{- $files := .Files.Glob "dashboards/*.json" -}}
{{- if gt (len $files) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.fullname" . }}-dashboards
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
{{- range $path, $bytes := $files }}
  {{ base $path }}: |-
{{ $bytes | toString | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
