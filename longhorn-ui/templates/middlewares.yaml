{{- if .Values.basicAuth.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "longhorn-ui.fullname" . }}-basicauth
  namespace: {{ .Values.namespace }}
spec:
  basicAuth:
    secret: {{ .Values.basicAuth.secretName }}
---
{{- end }}

{{- if .Values.ipAllowList.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "longhorn-ui.fullname" . }}-ipallow
  namespace: {{ .Values.namespace }}
spec:
  ipAllowList:
    sourceRange:
      {{- range .Values.ipAllowList.sourceRange }}
      - {{ . | quote }}
      {{- end }}
    {{- if .Values.ipAllowList.ipStrategy }}
    ipStrategy:
      useXForwardedFor: {{ .Values.ipAllowList.ipStrategy.useXForwardedFor }}
    {{- end }}
{{- end }}
