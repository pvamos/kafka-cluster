namespace: longhorn-system

ingress:
  enabled: true
  # stock k3s Traefik
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/tls-acme: false
  hosts:
    - host: longhorn.example.com
      paths:
        - path: /
          pathType: Prefix

service:
  name: longhorn-frontend
  port: 80

# --- Basic authentication (Traefik Middleware) ---
basicAuth:
  enabled: true
  # If you don't want to commit the secret into Git, set create: false
  # and create the secret manually:
  #   htpasswd -nbB admin 'REPLACE_ME' > auth
  #   kubectl -n longhorn-system create secret generic longhorn-basic-auth --from-file=users=auth
  create: true
  secretName: longhorn-ui-auth
  # Provide bcrypt htpasswd lines (one per user). Example output of:
  #   htpasswd -nbB admin 'REPLACE_ME'
  users:
    - 'admin:$2y$05$C8ZR6D018h1KLQ75SwUQZO7DhEAl5bfeK9pour4SyrrkMZAcZB4BK'

# --- Allow only the HAProxy VM(s) to reach the UI (L7 allowlist) ---
ipAllowList:
  enabled: false
  sourceRange:
    - 194.164.62.184/32
  ipStrategy:
    useXForwardedFor: true

# Extra middlewares to chain after ours, e.g. ["other-ns-someMW@kubernetescrd"]
extraMiddlewares: []