# Namespace to deploy to
namespace: kafka

# Strimzi operator version
strimziOperatorVersion: "0.49.1"

# PVC name
pvcname: kafka-pvc

# Kafka cluster
kafka:
  clusterName: gravelines
  version: 4.1.1
  storage:
    size: 45Gi
    class: kafka-local
  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
      authentication:
        type: scram-sha-512
  logging:
    type: inline
    loggers:
      log4j.logger.kafka: "INFO"
      log4j.logger.io.strimzi: "INFO"
      log4j.logger.org.apache.kafka: "INFO"
  entityOperator:
    topicOperator:
      watchedNamespace: kafka
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits:   { cpu: 500m, memory: 400Mi }
    userOperator:
      watchedNamespace: kafka
      resources:
        requests: { cpu: 100m, memory: 128Mi }
        limits:   { cpu: 500m, memory: 400Mi }
    template:
      pod:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/control-plane
                      operator: Exists
        tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

  config:
    auto_create_topics_enable: "false"
    delete_topic_enable: "true"

# KafkaNodePools for Brokers and Controllers
kafkaNodePools:
  - name: kafka-brokers
    replicas: 5
    roles:
      - broker
    storage:
      size: 20Gi
      class: kafka-local
    resources:
      requests:
        memory: 768Mi
        cpu: 100m
      limits:
        memory: 2560Mi
        cpu: 1200m
    jvmOptions:
      "-Xms": "1280m"
      "-Xmx": "1280m"
    template:
      pod:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/kafka
                      operator: In
                      values: ["true"]
        tolerations:
          - key: node-role.kubernetes.io/kafka
            operator: Exists
            effect: NoSchedule

  - name: kafka-controllers
    replicas: 3
    roles:
      - controller
    storage:
      size: 20Gi
      class: kafka-local
    resources:
      requests:
        memory: 384Mi
        cpu: 100m
      limits:
        memory: 768Mi
        cpu: 500m
    jvmOptions:
      "-Xms": "384m"
      "-Xmx": "384m"
    template:
      pod:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: node-role.kubernetes.io/control-plane
                      operator: In
                      values: ["true"]
        tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

# Kafka users
users:
  - name: admin
    type: scram-sha-512
    roles: admin
  - name: producer
    type: scram-sha-512
    roles: producer
  - name: consumer
    type: scram-sha-512
    roles: consumer
  - name: connect
    type: scram-sha-512
    roles: connect

# Kafka UI auth
kafkaUIauth:
  username: kafka-ui-admin
  type: scram-sha-512
  # Optional: UI login prompt
  uiLogin:
    enabled: true
    username: admin
    password: x1M30rVrBa8W

# Kafka topics auto-creation
topics:
  - name: sensors
    partitions: 3
    replicas: 3
    config:
      retention.ms: 2592000000  # Retain messages for 30 days
      segment.bytes: 52428800   # 50MB segments
