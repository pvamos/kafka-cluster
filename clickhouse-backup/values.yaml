namespace: clickhouse

clickhouse:
  host: "clickhouse-clickhouse"   # service generated by your CHI template comment
  port: 9000
  authSecretName: "clickhouse-auth"
  clusterName: "cluster01"
  database: "envsensor"
  table: "readings"

s3:
  namedCollection: "s3_backup"              # used for BACKUP ... TO S3
  markerNamedCollection: "s3_backup_marker" # used for INSERT INTO FUNCTION s3
  secretName: "clickhouse-backup-s3"
  bucket: "envsensor-clickhouse-backup"
  endpoint: "https://s3.example.com"
  region: "example-region"
  prefix: "clickhouse-backup"    # top-level prefix INSIDE the bucket

schedules:
  daily: "5 0 * * *"      # daily full at 00:05
  hourly: "10 * * * *"    # hourly incremental at HH:10
  cleanup: "30 1 * * *"   # cleanup at 01:30

backup:
  compressionMethod: "zstd"
  compressionLevel: 22     # max ZSTD level
  # Skip the *first* hourly run after the daily completed (covers long daily runtimes too).
  # Must be < 60 so that the *next* hourly (one hour later) is not skipped.
  skipHourlyAfterDailyMinutes: 55

# enable / disable the cleanup cronjob
cleanup:
  enabled: true

retention:
  daily: "240h"   # 10 days
  hourly: "72h"   # 3 days

images:
  clickhouseClient: "clickhouse/clickhouse-server:25.11-alpine"
  cleanup: "rclone/rclone:1.72.0"

resources:
  backupJob:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  cleanupJob:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

