{{- if .Values.cleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "clickhouse-backup.fullname" . }}-cleanup
  namespace: {{ .Values.namespace | quote }}
spec:
  schedule: {{ .Values.schedules.cleanup | quote }}
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: {{ include "clickhouse-backup.fullname" . }}
          restartPolicy: Never
          containers:
            - name: cleanup
              image: {{ .Values.images.cleanup | quote }}
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: {{ .Values.resources.cleanupJob.requests.cpu | quote }}
                  memory: {{ .Values.resources.cleanupJob.requests.memory | quote }}
                limits:
                  cpu: {{ .Values.resources.cleanupJob.limits.cpu | quote }}
                  memory: {{ .Values.resources.cleanupJob.limits.memory | quote }}
              env:
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.secretName | quote }}
                      key: endpoint
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.secretName | quote }}
                      key: region
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.secretName | quote }}
                      key: bucket
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.secretName | quote }}
                      key: access_key_id
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.s3.secretName | quote }}
                      key: secret_access_key
              command: ["/bin/sh","-ec"]
              args:
                - |
                  set -euo pipefail

                  # Configure rclone remote "s3:" entirely via env vars
                  export RCLONE_CONFIG_S3_TYPE="s3"
                  export RCLONE_CONFIG_S3_PROVIDER="Other"
                  export RCLONE_CONFIG_S3_ENDPOINT="${S3_ENDPOINT}"
                  export RCLONE_CONFIG_S3_REGION="${S3_REGION}"
                  export RCLONE_CONFIG_S3_ACCESS_KEY_ID="${S3_ACCESS_KEY_ID}"
                  export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY="${S3_SECRET_ACCESS_KEY}"

                  BASE="{{ .Values.s3.prefix }}/{{ .Values.clickhouse.database }}.{{ .Values.clickhouse.table }}"

                  DAILY_PATH="s3:${S3_BUCKET}/${BASE}/daily"
                  HOURLY_PATH="s3:${S3_BUCKET}/${BASE}/hourly"

                  echo "Cleanup policy:"
                  echo " - Delete daily objects older than {{ .Values.retention.daily }}"
                  echo " - Delete hourly objects older than {{ .Values.retention.hourly }}"
                  echo "Target:"
                  echo " - ${DAILY_PATH}"
                  echo " - ${HOURLY_PATH}"

                  # Daily: keep 10 days
                  rclone delete --min-age {{ .Values.retention.daily | quote }} --rmdirs "${DAILY_PATH}" || true

                  # Hourly: keep 2 days
                  rclone delete --min-age {{ .Values.retention.hourly | quote }} --rmdirs "${HOURLY_PATH}" || true

                  echo "Cleanup done."
{{- end }}
